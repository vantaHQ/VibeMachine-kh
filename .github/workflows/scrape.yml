name: Refresh Nairobi Vibes
on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at Midnight UTC
  workflow_dispatch: # Allows you to run it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd scraper
          npm install
          npx playwright install chromium

      - name: Run Scraper
        run: |
          cd scraper
          node vibe-scraper.js

      - name: Commit and Push Data
        run: |
          git config --global user.name "VibeBot"
          git config --global user.email "bot@vibemachine.com"
          git add data/spots.json
          git commit -m "Automated Data Refresh: $(date)" || echo "No changes to commit"
          git push